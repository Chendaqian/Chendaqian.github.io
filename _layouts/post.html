---
layout: default
---

<div id="{{ page.url | remove: "/" }}" class="unit whole align-left post">
    <article itemscope itemtype="http://schema.org/BlogPosting">
        <h2>
            {{ page.title }}
            <span id="like-btn" class="chip chip-btn"><i class="icon ion-ios-heart"></i> <span id="like-text">LIKE</span></span>
            <span id="share-btn" class="chip chip-btn"><i class="icon ion-android-share-alt"></i> SHARE</span>
        </h2>
        <div class="post-content">
            {{ page.content }}
        </div>
    </article>
    <div class="post-meta">
        <small class="chip">Creation date:{{ page.date | date: "%Y-%m-%d" }}</small>
        <small class="chip">Update date: {{page.modifyTime | date: "%Y-%m-%d"}}</small>
        {% if page.author %}
        <span class="chip" itemprop="author" itemscope itemtype="http://schema.org/Person">
            <span itemprop="name">Article by {{ page.author }}</span>
        </span>
        {% endif %}
    </div>
    <hr />
    {% include utteranc.html %}
</div>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js"></script>
<script type="text/javascript">(function () {
        var mermaidCodeBlocks = document.querySelectorAll('pre code.language-mermaid, pre code.lang-mermaid, code.language-mermaid, code.lang-mermaid');
        if (!mermaidCodeBlocks || mermaidCodeBlocks.length === 0) return;

        for (var i = 0; i < mermaidCodeBlocks.length; i++) {
            var codeElement = mermaidCodeBlocks[i];
            var rawText = codeElement.textContent || '';
            var mermaidContainer = document.createElement('div');
            mermaidContainer.className = 'mermaid';
            mermaidContainer.textContent = rawText;

            var preElement = codeElement.closest('pre');
            if (preElement && preElement.parentNode) {
                var wrapper = preElement.parentElement;
                if (wrapper && wrapper.classList.contains('highlight') && wrapper.parentNode) {
                    wrapper.parentNode.replaceChild(mermaidContainer, wrapper);
                } else {
                    preElement.parentNode.replaceChild(mermaidContainer, preElement);
                }
            } else if (codeElement.parentNode) {
                codeElement.parentNode.replaceChild(mermaidContainer, codeElement);
            }
        }

        mermaid.initialize({
            startOnLoad: true,
            securityLevel: 'loose'
        });
    })();
    // LIKE 飘心彩蛋
    (function () {
        var btn = document.getElementById('like-btn');
        if (!btn) return;
        btn.addEventListener('click', function () {
            var colors = ['#db4646', '#e91e63', '#ff6b81', '#ff4757', '#ff6348'];
            for (var i = 0; i < 8; i++) {
                var heart = document.createElement('span');
                heart.textContent = '❤️';
                heart.className = 'heart-particle';
                heart.style.left = (Math.random() * 30 - 15) + 'px';
                heart.style.animationDelay = Math.random() * 0.3 + 's';
                heart.style.animationDuration = (0.8 + Math.random() * 0.6) + 's';
                heart.style.fontSize = (14 + Math.random() * 18) + 'px';
                heart.style.color = colors[Math.floor(Math.random() * colors.length)];
                btn.appendChild(heart);
                setTimeout(function (el) { el.remove(); }, 1400, heart);
            }
        });

        // SHARE 复制链接
        var shareBtn = document.getElementById('share-btn');
        if (!shareBtn) return;
        shareBtn.addEventListener('click', function () {
            var url = window.location.href;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(url).then(function () {
                    shareBtn.innerHTML = '<i class="icon ion-android-share-alt"></i> 已复制!';
                    setTimeout(function () { shareBtn.innerHTML = '<i class="icon ion-android-share-alt"></i> SHARE'; }, 1500);
                });
            } else {
                var input = document.createElement('input');
                input.value = url;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                shareBtn.innerHTML = '<i class="icon ion-android-share-alt"></i> 已复制!';
                setTimeout(function () { shareBtn.innerHTML = '<i class="icon ion-android-share-alt"></i> SHARE'; }, 1500);
            }
        });
    })();
</script>
